<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Shower - Entrada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <div class="balloons">
      <span class="balloon b1"></span>
      <span class="balloon b2"></span>
      <span class="balloon b3"></span>
      <span class="balloon b4"></span>
    </div>

    <header class="hero">
      <p class="overline">Se viene el</p>
      <h1>Baby Shower</h1>
      <p class="name">Lucca Oseias Chacon Huamanccari</p>
      <p class="message">
        Estamos felices de compartir este momento importante con ustedes.
      </p>
    </header>

    <main class="invite">
      <button class="envelope" id="envelopeBtn" aria-label="Abrir invitación">
        <div class="envelope__back"></div>
        <div class="envelope__paper">
          <p class="paper__title">¡Te esperamos!</p>
        </div>
        <div class="envelope__bottom"></div>
        <div class="envelope__front"></div>
        <div class="envelope__seal">✉️</div>
      </button>
      <p class="cta">Dale clic para ver la invitación</p>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
